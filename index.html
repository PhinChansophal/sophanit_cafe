<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3f2a1d" />
    <title>Sophanit Cafe - Digital Menu</title>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>

<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-title">Edit Item</div>

        <div class="option-group">
            <label class="option-label" for="editNameInput">Name</label>
            <input id="editNameInput" class="input-field" type="text" placeholder="Item name">
        </div>

        <div class="option-group">
            <label class="option-label" for="editPriceInput">Price</label>
            <input id="editPriceInput" class="input-field" type="text" placeholder="$0.00">
        </div>

        <div class="option-group">
            <label class="option-label" for="editCaptionInput">Caption</label>
            <textarea id="editCaptionInput" class="input-field" rows="3" placeholder="Short description"></textarea>
        </div>

        <div class="option-group">
            <label class="option-label" for="editImageInput">Image URL</label>
            <input id="editImageInput" class="input-field" type="text" placeholder="Paste image URL here">
        </div>

        <div class="option-group">
            <label class="option-label" for="editCategorySelect">Category</label>
            <select id="editCategorySelect" class="input-field">
                    <option value="cafe">Cafe</option>
                    <option value="milktea">Milk Tea</option>
                    <option value="drink">Drink</option>
                    <option value="hot">Hot</option>
                </select>
        </div>

        <div class="edit-actions">
            <button class="action-btn secondary-btn" type="button" onclick="closeEditModal()">Cancel</button>
            <button class="action-btn order-btn" type="button" onclick="saveItemEdit()">Save</button>
        </div>
    </div>
</div>

<div class="modal" id="addModal">
    <div class="modal-content">
        <div class="modal-title">Add New Item</div>

        <div class="option-group">
            <label class="option-label" for="addNameInput">Name</label>
            <input id="addNameInput" class="input-field" type="text" placeholder="New item name">
        </div>

        <div class="option-group">
            <label class="option-label" for="addPriceInput">Price</label>
            <input id="addPriceInput" class="input-field" type="text" placeholder="$0.00">
        </div>

        <div class="option-group">
            <label class="option-label" for="addCaptionInput">Caption</label>
            <textarea id="addCaptionInput" class="input-field" rows="3" placeholder="Short description"></textarea>
        </div>

        <div class="option-group">
            <label class="option-label" for="addImageInput">Image URL</label>
            <input id="addImageInput" class="input-field" type="text" placeholder="Paste image URL here">
        </div>

        <div class="option-group">
            <label class="option-label" for="addCategorySelect">Category</label>
            <select id="addCategorySelect" class="input-field">
                    <option value="cafe">Cafe</option>
                    <option value="milktea">Milk Tea</option>
                    <option value="drink">Drink</option>
                    <option value="hot">Hot</option>
                </select>
        </div>

        <div class="edit-actions">
            <button class="action-btn secondary-btn" type="button" onclick="closeAddModal()">Cancel</button>
            <button class="action-btn order-btn" type="button" onclick="saveNewItem()">Create Item</button>
        </div>
    </div>
</div>

<div class="modal" id="brandModal">
    <div class="modal-content">
        <div class="modal-title">Edit Brand</div>

        <div class="option-group">
            <label class="option-label" for="brandNameInput">Brand Name</label>
            <input id="brandNameInput" class="input-field" type="text" placeholder="Sophanit Cafe">
        </div>

        <div class="option-group">
            <label class="option-label" for="brandCaptionInput">Caption</label>
            <input id="brandCaptionInput" class="input-field" type="text" placeholder="Fresh drinks • Fast order • Cozy vibes">
        </div>

        <div class="edit-actions">
            <button class="action-btn secondary-btn" type="button" onclick="closeBrandModal()">Cancel</button>
            <button class="action-btn order-btn" type="button" onclick="saveBrandEdit()">Save</button>
        </div>
    </div>
</div>

<div class="modal" id="listModal">
    <div class="modal-content">
        <div class="modal-title">Menu List</div>
        <div class="option-group">
            <button class="action-btn order-btn" type="button" onclick="openAddModal()">Add New Item</button>
        </div>
        <div id="listItemsContainer"></div>
        <div class="edit-actions">
            <button class="action-btn secondary-btn" type="button" onclick="closeListModal()">Close</button>
        </div>
    </div>
</div>

<div class="modal" id="paymentModal">
    <div class="modal-content">
        <div class="modal-title">Bank QR Payment</div>
        <div class="modal-desc">Your order total is <strong id="paymentTotal">$0.00</strong></div>
        <div class="order-summary" id="paymentOrderSummary"></div>

        <div class="payment-options">
            <div class="payment-card aba">
                <h3>ABA</h3>
                <p>Scan with ABA Mobile or ABA Pay.</p>
                <div class="payment-qr">
                    <img src="image/ABA.png" alt="ABA QR code">
                </div>
            </div>

            <div class="payment-card ac">
                <h3>AC</h3>
                <p>Scan with ACLEDA Mobile or KHQR.</p>
                <div class="payment-qr">
                    <img src="image/AC.png" alt="ACLEDA QR code">
                </div>
            </div>
        </div>

        <div class="edit-actions">
            <button class="action-btn secondary-btn" type="button" onclick="closePaymentModal()">Close</button>
        </div>
    </div>
</div>

<script>
    function createProductImage(name, category) {
        const colors = {
            cafe: "#3f2a1d",
            milktea: "#8c4b2b",
            drink: "#2b6a4f",
            hot: "#a3552f"
        };
        const color = colors[category] || "#3f2a1d";
        const safeName = name.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
                    <rect width="300" height="200" rx="24" fill="${color}"/>
                    <circle cx="235" cy="62" r="32" fill="rgba(255,255,255,0.16)"/>
                    <rect x="42" y="50" width="144" height="98" rx="18" fill="rgba(255,255,255,0.18)"/>
                    <path d="M82 96c18-24 54-24 72 0" stroke="#fff" stroke-width="8" stroke-linecap="round" fill="none"/>
                    <path d="M80 90h76" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
                    <text x="150" y="166" text-anchor="middle" font-family="Segoe UI, Arial" font-size="24" fill="white">${safeName}</text>
                </svg>`;
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    const defaultMenuData = [{
        id: 1,
        name: "Espresso",
        category: "cafe",
        price: "$2.00",
        desc: "Bold and rich single-origin espresso shot.",
        liked: false,
        image: createProductImage("Espresso", "cafe")
    }, {
        id: 2,
        name: "Cappuccino",
        category: "cafe",
        price: "$3.20",
        desc: "Velvety espresso with steamed milk and foam.",
        liked: false,
        image: createProductImage("Cappuccino", "cafe")
    }, {
        id: 3,
        name: "Latte",
        category: "cafe",
        price: "$3.50",
        desc: "Smooth espresso balanced with creamy milk.",
        liked: false,
        image: createProductImage("Latte", "cafe")
    }, {
        id: 4,
        name: "Caramel Macchiato",
        category: "cafe",
        price: "$3.90",
        desc: "Sweet caramel touch over fresh espresso.",
        liked: false,
        image: createProductImage("Caramel Macchiato", "cafe")
    }, {
        id: 5,
        name: "Classic Milk Tea",
        category: "milktea",
        price: "$3.50",
        desc: "Creamy black tea with rich milk flavor.",
        liked: false,
        image: createProductImage("Classic Milk Tea", "milktea")
    }, {
        id: 6,
        name: "Taro Milk Tea",
        category: "milktea",
        price: "$4.00",
        desc: "Soft purple taro blended into sweet milk tea.",
        liked: false,
        image: createProductImage("Taro Milk Tea", "milktea")
    }, {
        id: 7,
        name: "Matcha Latte",
        category: "milktea",
        price: "$4.20",
        desc: "Premium green tea whisked with smooth milk.",
        liked: false,
        image: createProductImage("Matcha Latte", "milktea")
    }, {
        id: 8,
        name: "Iced Lemon Tea",
        category: "drink",
        price: "$2.80",
        desc: "Refreshing citrus tea served chilled.",
        liked: false,
        image: createProductImage("Iced Lemon Tea", "drink")
    }, {
        id: 9,
        name: "Fruit Smoothie",
        category: "drink",
        price: "$4.50",
        desc: "Cold blended fruit beverage with natural sweetness.",
        liked: false,
        image: createProductImage("Fruit Smoothie", "drink")
    }, {
        id: 10,
        name: "Hot Chocolate",
        category: "hot",
        price: "$3.20",
        desc: "Warm cocoa drink topped with whipped cream.",
        liked: false,
        image: createProductImage("Hot Chocolate", "hot")
    }, {
        id: 11,
        name: "Ginger Tea",
        category: "hot",
        price: "$2.60",
        desc: "Comforting herbal tea with fresh ginger.",
        liked: false,
        image: createProductImage("Ginger Tea", "hot")
    }, {
        id: 12,
        name: "Americano",
        category: "cafe",
        price: "$2.80",
        desc: "Espresso shots mellowed with hot water.",
        liked: false,
        image: createProductImage("Americano", "cafe")
    }];

    const STORAGE_KEY = "sophanitCafeMenuData";
    const BRAND_KEY = "sophanitCafeBrand";
    const EDIT_PASSWORD = "123456";

    const defaultBrand = {
        name: "Sophanit Cafe",
        caption: "Fresh drinks • Fast order • Cozy vibes"
    };

    function loadBrandData() {
        try {
            const stored = localStorage.getItem(BRAND_KEY);
            if (!stored) return {...defaultBrand
            };
            return JSON.parse(stored);
        } catch (error) {
            return {...defaultBrand
            };
        }
    }

    function saveBrandData(brand) {
        localStorage.setItem(BRAND_KEY, JSON.stringify(brand));
    }

    function applyBrandData(brand) {
        if (!brand) return;
        document.querySelector("header h1").textContent = brand.name || defaultBrand.name;
        document.querySelector("header p").textContent = brand.caption || defaultBrand.caption;
        const nameInput = document.getElementById("brandNameInput");
        const captionInput = document.getElementById("brandCaptionInput");
        if (nameInput) nameInput.value = brand.name || defaultBrand.name;
        if (captionInput) captionInput.value = brand.caption || defaultBrand.caption;
    }

    function loadMenuData() {
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (!stored) return defaultMenuData.map(item => ({...item
            }));

            const parsed = JSON.parse(stored);
            return parsed.map(item => ({
                ...item,
                image: item.image || createProductImage(item.name, item.category),
                liked: Boolean(item.liked)
            }));
        } catch (error) {
            return defaultMenuData.map(item => ({...item
            }));
        }
    }

    function saveMenuData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(menuData));
    }

    const menuData = loadMenuData();
    const brandData = loadBrandData();
    applyBrandData(brandData);

    const categoryNames = {
        cafe: "Cafe",
        milktea: "Milk Tea",
        drink: "Drink",
        hot: "Hot"
    };

    let currentCategory = "all";
    let searchQuery = "";
    let cartItems = [];
    let currentOrderItem = null;

    const menuContainer = document.getElementById("menuContainer");
    const searchInput = document.getElementById("searchInput");
    const searchButton = document.getElementById("searchButton");
    const categoryTabs = document.getElementById("categoryTabs");
    const noResults = document.getElementById("noResults");
    const modal = document.getElementById("choiceModal");
    const editModal = document.getElementById("editModal");
    const addModal = document.getElementById("addModal");
    const brandModal = document.getElementById("brandModal");
    const listModal = document.getElementById("listModal");
    const paymentModal = document.getElementById("paymentModal");
    const paymentTotal = document.getElementById("paymentTotal");
    const paymentOrderSummary = document.getElementById("paymentOrderSummary");
    const listItemsContainer = document.getElementById("listItemsContainer");
    const editNameInput = document.getElementById("editNameInput");
    const editPriceInput = document.getElementById("editPriceInput");
    const editCaptionInput = document.getElementById("editCaptionInput");
    const editImageInput = document.getElementById("editImageInput");
    const editCategorySelect = document.getElementById("editCategorySelect");
    const addNameInput = document.getElementById("addNameInput");
    const addPriceInput = document.getElementById("addPriceInput");
    const addCaptionInput = document.getElementById("addCaptionInput");
    const addImageInput = document.getElementById("addImageInput");
    const addCategorySelect = document.getElementById("addCategorySelect");
    const brandNameInput = document.getElementById("brandNameInput");
    const brandCaptionInput = document.getElementById("brandCaptionInput");
    const editBrandButton = document.getElementById("editBrandButton");
    const addButton = document.getElementById("addButton");
    const manageButton = document.getElementById("manageButton");
    let editingItemId = null;

    function renderMenu() {
        menuContainer.innerHTML = "";
        let matchCount = 0;
        const filteredGroups = {};

        menuData.forEach(item => {
            const matchesCategory = currentCategory === "all" || item.category === currentCategory;
            const searchableText = `${item.name} ${item.desc}`.toLowerCase();
            const matchesSearch = searchableText.includes(searchQuery.trim().toLowerCase());

            if (matchesCategory && matchesSearch) {
                if (!filteredGroups[item.category]) filteredGroups[item.category] = [];
                filteredGroups[item.category].push(item);
                matchCount++;
            }
        });

        if (matchCount === 0) {
            noResults.style.display = "block";
            return;
        }

        noResults.style.display = "none";

        Object.keys(filteredGroups).forEach(cat => {
            const section = document.createElement("div");
            section.className = "category-group";

            const title = document.createElement("h2");
            title.className = "category-title";
            title.textContent = categoryNames[cat];
            section.appendChild(title);

            filteredGroups[cat].forEach(item => {
                const card = document.createElement("div");
                card.className = "menu-card";

                card.innerHTML = `
                        <div class="item-card-content">
                            <img class="item-image" src="${item.image || createProductImage(item.name, item.category)}" alt="${item.name}">
                            <div class="item-text">
                                <div class="item-header">
                                    <div>
                                        <div class="item-name">${item.name}</div>
                                        <div class="item-desc">${item.desc}</div>
                                    </div>
                                    <div class="item-price">${item.price}</div>
                                </div>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="action-btn order-btn" type="button">Order</button>
                            <button class="action-btn edit-btn" type="button">Edit</button>
                            <button class="action-btn like-btn ${item.liked ? "liked" : ""}" type="button">${item.liked ? "♥ Liked" : "♡ Like"}</button>
                        </div>
                    `;

                card.querySelector(".order-btn").addEventListener("click", () => openModal(item));
                card.querySelector(".edit-btn").addEventListener("click", () => openEditModal(item));
                card.querySelector(".like-btn").addEventListener("click", () => {
                    item.liked = !item.liked;
                    saveMenuData();
                    renderMenu();
                });

                section.appendChild(card);
            });

            menuContainer.appendChild(section);
        });
    }

    searchInput.addEventListener("input", (e) => {
        searchQuery = e.target.value;
        renderMenu();
    });

    searchButton.addEventListener("click", () => {
        searchQuery = searchInput.value;
        renderMenu();
    });

    searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            searchQuery = searchInput.value;
            renderMenu();
        }
    });

    categoryTabs.addEventListener("click", (e) => {
        const targetTab = e.target.closest(".tab");
        if (!targetTab) return;

        document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
        targetTab.classList.add("active");
        currentCategory = targetTab.dataset.category;
        renderMenu();
    });

    function parsePrice(priceText) {
        const numericValue = Number(String(priceText || "$0.00").replace(/[^0-9.-]+/g, ""));
        return Number.isFinite(numericValue) ? numericValue : 0;
    }

    function formatCurrency(value) {
        return new Intl.NumberFormat("en-US", {
            style: "currency",
            currency: "USD"
        }).format(value);
    }

    function getCartTotal() {
        return cartItems.reduce((sum, item) => sum + item.priceValue, 0);
    }

    function renderPaymentSummary() {
        paymentTotal.textContent = formatCurrency(getCartTotal());
        if (!cartItems.length) {
            paymentOrderSummary.innerHTML = '<div class="order-summary-item"><span>No items yet</span><span>$0.00</span></div>';
            return;
        }

        paymentOrderSummary.innerHTML = `
                <div class="order-summary-title">Current order</div>
                <div class="order-summary-list">
                    ${cartItems.map(item => `
                        <div class="order-summary-item">
                            <span>${item.name} · ${item.size} · ${item.sweetness}</span>
                            <strong>${formatCurrency(item.priceValue)}</strong>
                        </div>
                    `).join("")}
                </div>
            `;
        }

        function openModal(item) {
            currentOrderItem = item;
            document.getElementById("modalItemName").textContent = item.name;
            document.getElementById("modalItemDesc").textContent = item.desc;
            modal.classList.add("open");
        }

        function closeModal() {
            currentOrderItem = null;
            modal.classList.remove("open");
        }

        function closePaymentModal() {
            paymentModal.classList.remove("open");
        }

        function showPaymentModal() {
            renderPaymentSummary();
            paymentModal.classList.add("open");
        }

        function confirmOrderSelection() {
            if (!currentOrderItem) return;

            const selectedSize = document.querySelector('input[name="size"]:checked')?.value || "Regular";
            const selectedSweetness = document.querySelector('input[name="sweet"]:checked')?.value || "Normal";
            const priceValue = parsePrice(currentOrderItem.price) + (selectedSize === "Large" ? 0.5 : 0);

            cartItems.push({
                name: currentOrderItem.name,
                size: selectedSize,
                sweetness: selectedSweetness,
                priceValue
            });

            closeModal();
            showPaymentModal();
        }

        function openEditModal(item) {
            const enteredPassword = window.prompt("Enter edit password");
            if (enteredPassword === null || enteredPassword.trim() !== EDIT_PASSWORD) {
                if (enteredPassword !== null) {
                    window.alert("Incorrect password");
                }
                return;
            }

            editingItemId = item.id;
            editNameInput.value = item.name;
            editPriceInput.value = item.price;
            editCaptionInput.value = item.desc;
            editImageInput.value = item.image || "";
            editCategorySelect.value = item.category;
            editModal.classList.add("open");
        }

        function closeEditModal() {
            editModal.classList.remove("open");
        }

        function openAddModal() {
            addNameInput.value = "";
            addPriceInput.value = "";
            addCaptionInput.value = "";
            addImageInput.value = "";
            addCategorySelect.value = "cafe";
            addModal.classList.add("open");
        }

        function closeAddModal() {
            addModal.classList.remove("open");
        }

        function openBrandModal() {
            const enteredPassword = window.prompt("Enter edit password");
            if (enteredPassword === null || enteredPassword.trim() !== EDIT_PASSWORD) {
                if (enteredPassword !== null) {
                    window.alert("Incorrect password");
                }
                return;
            }

            applyBrandData(loadBrandData());
            brandModal.classList.add("open");
        }

        function closeBrandModal() {
            brandModal.classList.remove("open");
        }

        function saveBrandEdit() {
            const brand = {
                name: brandNameInput.value.trim() || defaultBrand.name,
                caption: brandCaptionInput.value.trim() || defaultBrand.caption
            };
            saveBrandData(brand);
            applyBrandData(brand);
            closeBrandModal();
        }

        function openListModal() {
            renderListModal();
            listModal.classList.add("open");
        }

        function closeListModal() {
            listModal.classList.remove("open");
        }

        function saveItemEdit() {
            if (editingItemId === null) return;

            const item = menuData.find(entry => entry.id === editingItemId);
            if (!item) return;

            item.name = editNameInput.value.trim() || item.name;
            item.price = editPriceInput.value.trim() || item.price;
            item.desc = editCaptionInput.value.trim() || item.desc;
            item.category = editCategorySelect.value || item.category;
            item.image = editImageInput.value.trim() || createProductImage(item.name, item.category);

            saveMenuData();
            closeEditModal();
            renderMenu();
            if (listModal.classList.contains("open")) renderListModal();
        }

        function saveNewItem() {
            const newItem = {
                id: Date.now(),
                name: addNameInput.value.trim() || "New Item",
                category: addCategorySelect.value || "cafe",
                price: addPriceInput.value.trim() || "$0.00",
                desc: addCaptionInput.value.trim() || "Freshly added menu item.",
                liked: false,
                image: addImageInput.value.trim() || createProductImage(addNameInput.value.trim() || "New Item", addCategorySelect.value || "cafe")
            };

            menuData.push(newItem);
            saveMenuData();
            closeAddModal();
            renderMenu();
            if (listModal.classList.contains("open")) renderListModal();
        }

        function renderListModal() {
            listItemsContainer.innerHTML = "";
            menuData.forEach(item => {
                const row = document.createElement("div");
                row.className = "list-row";
                row.innerHTML = `
                    <div>
                        <strong>${item.name}</strong>
                        <div class="list-item-meta">${item.category.toUpperCase()} · ${item.price}</div>
                    </div>
                    <div class="list-actions">
                        <button class="action-btn edit-btn" type="button">Edit</button>
                        <button class="action-btn secondary-btn" type="button">Delete</button>
                    </div>
                `;

                row.querySelector(".edit-btn").addEventListener("click", () => openEditModal(item));
                row.querySelector(".secondary-btn").addEventListener("click", () => deleteMenuItem(item.id));
                listItemsContainer.appendChild(row);
            });
        }

        function deleteMenuItem(itemId) {
            const index = menuData.findIndex(item => item.id === itemId);
            if (index === -1) return;
            menuData.splice(index, 1);
            saveMenuData();
            renderMenu();
            if (listModal.classList.contains("open")) renderListModal();
        }

        modal.addEventListener("click", (e) => {
            if (e.target === modal) closeModal();
        });

        editModal.addEventListener("click", (e) => {
            if (e.target === editModal) closeEditModal();
        });

        addModal.addEventListener("click", (e) => {
            if (e.target === addModal) closeAddModal();
        });

        listModal.addEventListener("click", (e) => {
            if (e.target === listModal) closeListModal();
        });

        paymentModal.addEventListener("click", (e) => {
            if (e.target === paymentModal) closePaymentModal();
        });

        addButton.addEventListener("click", openAddModal);
        if (editBrandButton) {
            editBrandButton.addEventListener("click", openBrandModal);
        }
        if (manageButton) {
            manageButton.addEventListener("click", openListModal);
        }

        renderMenu();

        // Sync updates across browser tabs/windows using the Storage event.
        window.addEventListener("storage", (e) => {
            try {
                if (!e.key) return;

                if (e.key === STORAGE_KEY) {
                    // Another tab updated the menu data — reload and re-render
                    const parsed = JSON.parse(e.newValue || "[]");
                    // replace contents of menuData array while keeping reference
                    menuData.length = 0;
                    parsed.forEach(item => menuData.push({
                        ...item,
                        image: item.image || createProductImage(item.name, item.category),
                        liked: Boolean(item.liked)
                    }));
                    renderMenu();
                    if (listModal.classList.contains("open")) renderListModal();
                }

                if (e.key === BRAND_KEY) {
                    // Brand changed in another tab — apply it
                    const brand = JSON.parse(e.newValue || "{}");
                    applyBrandData(brand);
                }
            } catch (err) {
                // ignore malformed data
                console.warn("Storage sync failed:", err);
            }
        });
</script>
</body>

</html>
